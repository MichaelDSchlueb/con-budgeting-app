version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd con-budgeting-app
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: con-budgeting-app/dist
    files:
      - '**/*'
  cache:
    paths:
      - con-budgeting-app/node_modules/**/*